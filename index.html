<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUNY AI Linktree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      color: #fff;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px 24px;
      width: 100%;
      max-width: 480px;
    }

    .logo {
      width: 200px;
      height: auto;
      margin-bottom: 4px;
    }

    .logo-lg {
      width: 280px;
      height: auto;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 12px;
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .links a {
      display: inline-block;
      padding: 14px 32px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      color: #fff;
      text-decoration: none;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .links a:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-2px);
    }

    .links a:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="tlc-logo.png" alt="Teaching and Learning Center" class="logo">
    <h1>CUNY AI Linktree</h1>
    <div class="links">
      <a href="https://aitoolkit.commons.gc.cuny.edu/" target="_blank" rel="noopener">Teach@CUNY AI Toolkit</a>
      <a href="https://criticalai.commons.gc.cuny.edu/" target="_blank" rel="noopener">Critical AI Literacy Institute</a>
      <a href="https://ailab.gc.cuny.edu/" target="_blank" rel="noopener">CUNY AI Lab</a>
    </div>
    <img src="logo.png" alt="CUNY AI Lab" class="logo-lg">
  </div>
</body>
</html>
